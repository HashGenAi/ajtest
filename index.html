<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Movie Blog</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
}

h1{
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.card{
  background:#1c1c1c;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
}

.poster{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

.content{
  padding:14px;
}

.title{
  font-size:17px;
  margin:0 0 10px;
}

.meta{
  font-size:13px;
  color:#bbb;
  margin-bottom:10px;
}

.desc{
  font-size:14px;
  color:#ddd;
  line-height:1.5;
}

.pagination{
  margin-top:40px;
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  border:none;
  background:#fff;
  color:#000;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

#detailView{
  display:none;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

.loading{
  text-align:center;
  padding:40px;
}

</style>
</head>

<body>

<h1>Latest Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">

  <button onclick="goBack()">⬅ Back</button>

  <div id="detailContent"></div>

</div>

<div class="pagination" id="pagination">

  <button id="prevBtn">Prev</button>

  <span id="pageNum">1</span>

  <button id="nextBtn">Next</button>

</div>

<script>

const API = "https://jiorockers.salim1monira.workers.dev";

let currentPage = 1;

const postsEl = document.getElementById("posts");
const detailView = document.getElementById("detailView");
const detailContent = document.getElementById("detailContent");
const pageNumEl = document.getElementById("pageNum");
const pagination = document.getElementById("pagination");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

// =====================
// SLUG
// =====================

function slugify(text){

  return (text || "")
    .toString()
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');

}

// =====================
// IMAGE
// =====================

function getImage(post){

  return (
    post.media$thumbnail?.url?.replace("/s72-c/","/s500/")
    ||
    post.content?.$t?.match(/<img.*?src="(.*?)"/i)?.[1]
    ||
    "https://via.placeholder.com/500x280?text=No+Image"
  );

}

// =====================
// SUMMARY
// =====================

function getSummary(html){

  if(!html) return "";

  const div = document.createElement("div");

  div.innerHTML = html;

  return div.innerText
    .replace(/\s+/g," ")
    .trim()
    .substring(0,120) + "...";

}

// =====================
// CARD
// =====================

function createCard(post){

  const title = post.title?.$t || "No Title";

  const image = getImage(post);

  const summary = getSummary(post.content?.$t);

  const date = new Date(post.published?.$t)
    .toLocaleDateString();

  const slug = slugify(title);

  return `
    <div class="card" onclick="openPost('${slug}')">

      <img class="poster" src="${image}" loading="lazy">

      <div class="content">

        <h3 class="title">${title}</h3>

        <div class="meta">${date}</div>

        <div class="desc">${summary}</div>

      </div>

    </div>
  `;
}

// =====================
// OPEN POST
// =====================

function openPost(slug){

  location.href = "/post/" + slug;

}

// =====================
// RENDER POST
// =====================

function renderPost(post){

  postsEl.style.display = "none";

  pagination.style.display = "none";

  detailView.style.display = "block";

  detailContent.innerHTML = `
    <h2>${post.title?.$t || "No Title"}</h2>

    <div>
      ${post.content?.$t || ""}
    </div>
  `;

}

// =====================
// LOAD SINGLE POST
// =====================

async function loadSinglePost(){

  const slug = window.location.pathname
    .replace("/post/","")
    .replace(/\/$/,"");

  detailView.style.display = "block";

  postsEl.style.display = "none";

  pagination.style.display = "none";

  detailContent.innerHTML =
    `<div class="loading">Loading post...</div>`;

  const res =
    await fetch(API + "?slug=" + encodeURIComponent(slug));

  const post = await res.json();

  if(!post){

    detailContent.innerHTML =
      "<h2>Post not found</h2>";

    return;
  }

  renderPost(post);

}

// =====================
// LOAD POSTS
// =====================

async function loadPosts(page){

  detailView.style.display = "none";

  postsEl.style.display = "grid";

  pagination.style.display = "flex";

  postsEl.innerHTML =
    `<div class="loading">Loading...</div>`;

  const res =
    await fetch(API + "?page=" + page);

  const data = await res.json();

  const posts = data.posts || [];

  postsEl.innerHTML =
    posts.map(createCard).join("");

  pageNumEl.innerText = page;

  prevBtn.disabled = page <= 1;

}

// =====================
// BACK
// =====================

function goBack(){

  location.href = "/";

}

// =====================
// PAGINATION
// =====================

nextBtn.onclick = () => {

  currentPage++;

  loadPosts(currentPage);

};

prevBtn.onclick = () => {

  if(currentPage > 1){

    currentPage--;

    loadPosts(currentPage);

  }

};

// =====================
// INIT
// =====================

(async function(){

  if(window.location.pathname.startsWith("/post/")){

    await loadSinglePost();

  }else{

    await loadPosts(currentPage);

  }

})();

</script>

</body>
</html>
