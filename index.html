<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Movie Blog</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:15px;
}

/* =========================
   TITLE
========================= */

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:28px;
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
}

@media(max-width:480px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
}

/* =========================
   CARD
========================= */

.card{
  background:#1c1c1c;
  border:1px solid #2a2a2a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s ease;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-4px);
}

/* =========================
   IMAGE
========================= */

.poster-wrap{
  width:100%;
  aspect-ratio:3/5;
  overflow:hidden;
  background:#222;
}

.poster{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .3s ease;
}

.card:hover .poster{
  transform:scale(1.05);
}

/* =========================
   CONTENT
========================= */

.content{
  padding:7px;
  text-align:center;
}

.title{
  font-size:14px;
  font-weight:700;
  line-height:1.3;
  transition:.25s ease;
}

/* colorful titles */

.card:nth-child(6n+1) .title{
  color:#ffb26b;
}

.card:nth-child(6n+2) .title{
  color:#d2a8ff;
}

.card:nth-child(6n+3) .title{
  color:#8bd3ff;
}

.card:nth-child(6n+4) .title{
  color:#7ee2a8;
}

.card:nth-child(6n+5) .title{
  color:#ffd166;
}

.card:nth-child(6n+6) .title{
  color:#ff8c8c;
}

.card:hover .title{
  transform:translateX(4px);
  opacity:.9;
}

/* =========================
   META
========================= */

.meta{
  margin-top:6px;
  font-size:11px;
  color:#999;
}

/* =========================
   LABELS
========================= */

.labels{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
  margin-top:7px;
}

.label{
  background:#2e2e2e;
  padding:4px 8px;
  border-radius:30px;
  font-size:10px;
  color:#ddd;
}

/* =========================
   DESC
========================= */

.desc{
  margin-top:8px;
  font-size:12px;
  color:#bbb;
  line-height:1.45;
}

/* =========================
   PAGINATION
========================= */

.pagination{
  margin-top:35px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

button{
  border:none;
  background:#e50914;
  color:#fff;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:.5;
}

/* =========================
   LOADING
========================= */

.loading{
  text-align:center;
  padding:40px;
  font-size:18px;
  grid-column:1/-1;
}

/* =========================
   DETAIL VIEW
========================= */

#detailView{
  display:none;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

.backBtn{
  margin-bottom:15px;
}
</style>
</head>

<body>

<h1>Latest Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">
  <button class="backBtn" onclick="goBack()">⬅ Back</button>
  <div id="detailContent"></div>
</div>

<div class="pagination">
  <button id="prevBtn">Prev</button>
  <span id="pageNum">1</span>
  <button id="nextBtn">Next</button>
</div>

<script>
const API = "https://jiorockers-api.salim1monira.workers.dev";

let currentPage = 1;
let allPosts = [];

const postsEl = document.getElementById("posts");
const pageNumEl = document.getElementById("pageNum");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const detailView = document.getElementById("detailView");
const detailContent = document.getElementById("detailContent");

// slug generator
function slugify(text){
  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

// image
function getImage(post){
  return (
    post.media$thumbnail?.url?.replace("/s72-c/","/s500/")
    ||
    post.content?.$t.match(/<img.*?src="(.*?)"/i)?.[1]
    ||
    "https://via.placeholder.com/500x750?text=No+Image"
  );
}

// summary
function getSummary(html){
  if(!html) return "";

  const div = document.createElement("div");
  div.innerHTML = html;

  return div.innerText
    .replace(/\s+/g," ")
    .trim()
    .substring(0,70) + "...";
}

// labels
function getLabels(post){
  return post.category?.map(c => c.term) || [];
}

// create card
function createCard(post){

  const image = getImage(post);
  const title = post.title?.$t || "No Title";
  const summary = getSummary(post.content?.$t);
  const labels = getLabels(post);
  const date = new Date(post.published?.$t).toLocaleDateString();

  const slug = slugify(title);

  return `
    <div class="card" onclick="openPost('${slug}')">

      <div class="poster-wrap">
        <img class="poster" src="${image}" loading="lazy">
      </div>

      <div class="content">

        <div class="title">${title}</div>

        <div class="meta">${date}</div>

        <div class="labels">
          ${labels.slice(0,3).map(l =>
            `<span class="label">${l}</span>`
          ).join("")}
        </div>

        <div class="desc">${summary}</div>

      </div>

    </div>
  `;
}

// open post
function openPost(slug){

  const post = allPosts.find(p =>
    slugify(p.title?.$t || "") === slug
  );

  if(!post){

    postsEl.style.display = "none";
    detailView.style.display = "block";

    detailContent.innerHTML = "<h2>Post not found</h2>";

    return;
  }

  const title = post.title?.$t || "No Title";
  const content = post.content?.$t || "";

  postsEl.style.display = "none";
  detailView.style.display = "block";

  detailContent.innerHTML = `
    <h2 style="margin-bottom:15px;">${title}</h2>
    <div>${content}</div>
  `;

  history.pushState({slug}, "", "?post=" + slug);
}

// back
function goBack(){

  postsEl.style.display = "grid";
  detailView.style.display = "none";

  history.pushState({}, "", window.location.pathname);
}

// check URL
function checkURL(){

  const params = new URLSearchParams(window.location.search);

  const slug = params.get("post");

  if(slug && allPosts.length){
    openPost(slug);
  }
}

// load posts
async function loadPosts(page){

  postsEl.innerHTML =
  `<div class="loading">Loading...</div>`;

  try{

    const res = await fetch(API + "?page=" + page);

    const data = await res.json();

    allPosts = data.posts || [];

    postsEl.innerHTML =
      allPosts.map(p => createCard(p)).join("");

    pageNumEl.innerText = page;

    prevBtn.disabled = page <= 1;

    checkURL();

  }catch(e){

    postsEl.innerHTML =
    `<div class="loading">
      Failed to load posts
    </div>`;
  }
}

// next
nextBtn.onclick = () => {
  currentPage++;
  loadPosts(currentPage);
};

// prev
prevBtn.onclick = () => {

  if(currentPage > 1){

    currentPage--;

    loadPosts(currentPage);
  }
};

// browser back
window.onpopstate = () => {

  if(location.search.includes("post=")){

    const slug =
      new URLSearchParams(location.search)
      .get("post");

    openPost(slug);

  }else{

    goBack();
  }
};

loadPosts(currentPage);
</script>

</body>
</html>
