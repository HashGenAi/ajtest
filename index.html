<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Premium Movie Blog</title>

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:14px;
}

/* =========================
   TITLE
========================= */

h1{
  text-align:center;
  margin-bottom:24px;
  font-size:30px;
  font-weight:800;
  letter-spacing:.5px;
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:16px;
  align-items:start;
}

/* Desktop */
@media(max-width:1400px){
  .grid{
    grid-template-columns:repeat(5,1fr);
  }
}

/* Laptop */
@media(max-width:1100px){
  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}

/* Tablet */
@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
}

/* Mobile */
@media(max-width:480px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
}

/* =========================
   CARD
========================= */

.card{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  background:linear-gradient(
    180deg,
    #1d1d1d 0%,
    #141414 100%
  );
  border:1px solid rgba(255,255,255,.07);
  box-shadow:
    0 6px 18px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.03);
  cursor:pointer;
  transition:.28s ease;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:
    0 16px 35px rgba(0,0,0,.45),
    0 0 18px rgba(229,9,20,.15);
}

/* Glow border */

.card::before{
  content:"";
  position:absolute;
  inset:0;
  padding:1px;
  border-radius:18px;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,.15),
    rgba(255,255,255,0),
    rgba(229,9,20,.2)
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

/* =========================
   IMAGE
========================= */

.poster-wrap{
  width:100%;
  aspect-ratio:2/3;
  overflow:hidden;
  position:relative;
  background:#222;
}

.poster{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform .45s ease;
}

.card:hover .poster{
  transform:scale(1.08);
}

/* Dark overlay */

.poster-wrap::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:45%;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.9),
    transparent
  );
}

/* =========================
   QUALITY BADGE
========================= */

.quality{
  position:absolute;
  top:10px;
  right:10px;
  z-index:2;
  background:#e50914;
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:5px 8px;
  border-radius:30px;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  backdrop-filter:blur(6px);
}

/* =========================
   CONTENT
========================= */

.content{
  padding:10px;
  display:flex;
  flex-direction:column;
  flex:1;
}

/* =========================
   TITLE
========================= */

.title{
  font-size:14px;
  font-weight:700;
  line-height:1.35;
  margin-bottom:8px;
  transition:.25s ease;
  min-height:38px;
}

/* colorful titles */

.card:nth-child(6n+1) .title{
  color:#ffb86b;
}

.card:nth-child(6n+2) .title{
  color:#d7a8ff;
}

.card:nth-child(6n+3) .title{
  color:#81d4fa;
}

.card:nth-child(6n+4) .title{
  color:#72efb0;
}

.card:nth-child(6n+5) .title{
  color:#ffd166;
}

.card:nth-child(6n+6) .title{
  color:#ff8c8c;
}

.card:hover .title{
  transform:translateX(4px);
}

/* =========================
   META
========================= */

.meta{
  font-size:11px;
  color:#9d9d9d;
  margin-bottom:8px;
}

/* =========================
   LABELS
========================= */

.labels{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:8px;
}

.label{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.06);
  color:#ddd;
  font-size:10px;
  padding:5px 8px;
  border-radius:30px;
  backdrop-filter:blur(8px);
}

/* =========================
   DESCRIPTION
========================= */

.desc{
  font-size:12px;
  color:#bdbdbd;
  line-height:1.5;
  margin-top:auto;
}

/* =========================
   PAGINATION
========================= */

.pagination{
  margin-top:35px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

button{
  border:none;
  outline:none;
  background:linear-gradient(
    135deg,
    #e50914,
    #b20710
  );
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:.25s ease;
  box-shadow:0 6px 18px rgba(229,9,20,.25);
}

button:hover{
  transform:translateY(-2px);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

#pageNum{
  font-weight:700;
  color:#ddd;
}

/* =========================
   LOADING
========================= */

.loading{
  grid-column:1/-1;
  text-align:center;
  padding:60px 20px;
  font-size:18px;
  color:#ddd;
}

/* =========================
   DETAIL VIEW
========================= */

#detailView{
  display:none;
  max-width:1000px;
  margin:auto;
  background:#181818;
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 35px rgba(0,0,0,.35);
}

.backBtn{
  margin-bottom:20px;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#333;
  border-radius:20px;
}

::-webkit-scrollbar-track{
  background:#111;
}

</style>
</head>

<body>

<h1>Latest Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">
  <button class="backBtn" onclick="goBack()">⬅ Back</button>
  <div id="detailContent"></div>
</div>

<div class="pagination">
  <button id="prevBtn">Prev</button>
  <span id="pageNum">1</span>
  <button id="nextBtn">Next</button>
</div>

<script>

const API =
"https://jiorockers-api.salim1monira.workers.dev";

let currentPage = 1;
let allPosts = [];

const POSTS_PER_PAGE = 24;

const postsEl = document.getElementById("posts");
const pageNumEl = document.getElementById("pageNum");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const detailView =
document.getElementById("detailView");

const detailContent =
document.getElementById("detailContent");

/* =========================
   SLUG
========================= */

function slugify(text){

  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

/* =========================
   IMAGE
========================= */

function getImage(post){

  return (

    post.media$thumbnail?.url
      ?.replace("/s72-c/","/s1000/")

    ||

    post.content?.$t
      .match(/<img.*?src="(.*?)"/i)?.[1]

    ||

    "https://via.placeholder.com/500x750?text=No+Image"
  );
}

/* =========================
   SUMMARY
========================= */

function getSummary(html){

  if(!html) return "";

  const div = document.createElement("div");

  div.innerHTML = html;

  return div.innerText
    .replace(/\s+/g," ")
    .trim()
    .substring(0,70) + "...";
}

/* =========================
   LABELS
========================= */

function getLabels(post){

  return post.category?.map(c => c.term) || [];
}

/* =========================
   CARD
========================= */

function createCard(post){

  const image = getImage(post);

  const title =
    post.title?.$t || "No Title";

  const summary =
    getSummary(post.content?.$t);

  const labels = getLabels(post);

  const date =
    new Date(post.published?.$t)
    .toLocaleDateString();

  const slug = slugify(title);

  return `

    <div class="card"
    onclick="openPost('${slug}')">

      <div class="poster-wrap">

        <img class="poster"
        src="${image}"
        loading="lazy">

        <div class="quality">
          HD
        </div>

      </div>

      <div class="content">

        <div class="title">
          ${title}
        </div>

        <div class="meta">
          ${date}
        </div>

        <div class="labels">

          ${labels.slice(0,2).map(l =>

            `<span class="label">${l}</span>`

          ).join("")}

        </div>

        <div class="desc">
          ${summary}
        </div>

      </div>

    </div>
  `;
}

/* =========================
   OPEN POST
========================= */

function openPost(slug){

  const post = allPosts.find(p =>

    slugify(p.title?.$t || "")
    === slug
  );

  if(!post){

    postsEl.style.display = "none";

    detailView.style.display = "block";

    detailContent.innerHTML =
    "<h2>Post not found</h2>";

    return;
  }

  const title =
    post.title?.$t || "No Title";

  const content =
    post.content?.$t || "";

  postsEl.style.display = "none";

  detailView.style.display = "block";

  detailContent.innerHTML = `

    <h2 style="
      margin-bottom:20px;
      font-size:32px;
      line-height:1.4;
    ">
      ${title}
    </h2>

    <div>
      ${content}
    </div>
  `;

  history.pushState(
    {slug},
    "",
    "?post=" + slug
  );
}

/* =========================
   BACK
========================= */

function goBack(){

  postsEl.style.display = "grid";

  detailView.style.display = "none";

  history.pushState(
    {},
    "",
    window.location.pathname
  );
}

/* =========================
   URL CHECK
========================= */

function checkURL(){

  const params =
    new URLSearchParams(
      window.location.search
    );

  const slug = params.get("post");

  if(slug && allPosts.length){

    openPost(slug);
  }
}

/* =========================
   LOAD POSTS
========================= */

async function loadPosts(page){

  postsEl.innerHTML = `
    <div class="loading">
      Loading Premium Movies...
    </div>
  `;

  try{

    const res = await fetch(
      API +
      "?page=" + page +
      "&limit=" + POSTS_PER_PAGE
    );

    const data = await res.json();

    allPosts = data.posts || [];

    postsEl.innerHTML =
      allPosts.map(
        p => createCard(p)
      ).join("");

    pageNumEl.innerText = page;

    prevBtn.disabled = page <= 1;

    checkURL();

    window.scrollTo({
      top:0,
      behavior:"smooth"
    });

  }catch(e){

    postsEl.innerHTML = `
      <div class="loading">
        Failed to load posts
      </div>
    `;
  }
}

/* =========================
   NEXT
========================= */

nextBtn.onclick = () => {

  currentPage++;

  loadPosts(currentPage);
};

/* =========================
   PREV
========================= */

prevBtn.onclick = () => {

  if(currentPage > 1){

    currentPage--;

    loadPosts(currentPage);
  }
};

/* =========================
   POPSTATE
========================= */

window.onpopstate = () => {

  if(location.search.includes("post=")){

    const slug =
      new URLSearchParams(
        location.search
      ).get("post");

    openPost(slug);

  }else{

    goBack();
  }
};

/* =========================
   INITIAL LOAD
========================= */

loadPosts(currentPage);

</script>

</body>
</html>
