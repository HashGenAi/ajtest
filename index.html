  <style>
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.xk91-main-container {
    width: 100%;
    max-width: 1200px;
    margin: auto;
    padding: 10px;
}

.xk91-section-title {
    text-align: center;
    font-size: 1.6em;
    margin-bottom: 20px;
    color: #222;
}

/* ========================= */
/* 🔥 GRID (3 COLUMNS ALWAYS)
/* ========================= */

.xk91-post-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

/* Tablet */
@media (max-width: 1024px) {
    .xk91-post-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

/* Small screens */
@media (max-width: 768px) {
    .xk91-post-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
}

/* Very small screens */
@media (max-width: 480px) {
    .xk91-post-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
    }
}

/* ========================= */
/* 🔥 CARD STYLE */
/* ========================= */

.xk91-post-item {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: transform 0.2s ease;
    display: flex;
    flex-direction: column;
}

.xk91-post-item:hover {
    transform: translateY(-3px);
}

/* IMAGE */
.xk91-image-container {
    width: 100%;
    aspect-ratio: 3/5;
    overflow: hidden;
    background: #ddd;
}

.xk91-image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.xk91-post-item:hover .xk91-image-container img {
    transform: scale(1.05);
}

/* CONTENT */
.xk91-content {
    padding: 6px;
    text-align: center;
}

.xk91-post-title {
    font-size: 0.95em;
    font-weight: bold;
    color: #333;
    line-height: 1.2;
}

.xk91-post-title a {
    text-decoration: none;
    color: inherit;
}

/* SNIPPET */
.xk91-post-body {
    font-size: 12px;
    color: #666;
    margin-top: 5px;
    line-height: 1.4;
}

/* ========================= */
/* 🔥 LOAD MORE BUTTON */
/* ========================= */

    margin: 20px 0;

    justify-content: center;
    gap: 10px;

.load-btn:hover {

*{box-sizing:border-box;}

body{

<body>

<h1>Latest Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">
  <button class="backBtn" onclick="goBack()">⬅ Back</button>
  <div id="detailContent"></div>
</div>

<div class="pagination">
  <button id="prevBtn">Prev</button>
  <span id="pageNum">1</span>
  <button id="nextBtn">Next</button>
</div>

<script>
const API = "https://jiorockers-api.salim1monira.workers.dev";

let currentPage = 1;
let allPosts = [];

const postsEl = document.getElementById("posts");
const pageNumEl = document.getElementById("pageNum");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const detailView = document.getElementById("detailView");
const detailContent = document.getElementById("detailContent");

// slug generator
function slugify(text){
  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

function getImage(post){
  return (
    post.media$thumbnail?.url?.replace("/s72-c/","/s500/")
    ||
    post.content?.$t.match(/<img.*?src="(.*?)"/i)?.[1]
    ||
    "https://via.placeholder.com/500x280?text=No+Image"
  );
}

function getSummary(html){
  if(!html) return "";
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.innerText.replace(/\s+/g," ").trim().substring(0,120) + "...";
}

function getLabels(post){
  return post.category?.map(c => c.term) || [];
}

// create card
function createCard(post){
  const image = getImage(post);
  const title = post.title?.$t || "No Title";
  const summary = getSummary(post.content?.$t);
  const labels = getLabels(post);
  const date = new Date(post.published?.$t).toLocaleDateString();

  const slug = slugify(title);

  return `
    <div class="card" onclick="openPost('${slug}')">

      <img class="poster" src="${image}" loading="lazy">

      <div class="content">

        <h3 class="title">${title}</h3>

        <div class="meta">${date}</div>

        <div class="labels">
          ${labels.map(l => `<span class="label">${l}</span>`).join("")}
        </div>

        <div class="desc">${summary}</div>

      </div>

    </div>
  `;
}

// open post by slug
function openPost(slug){

  const post = allPosts.find(p =>
    slugify(p.title?.$t || "") === slug
  );

  if(!post){
    postsEl.style.display = "none";
    detailView.style.display = "block";
    detailContent.innerHTML = "<h2>Post not found</h2>";
    return;
  }

  const title = post.title?.$t || "No Title";
  const content = post.content?.$t || "";

  postsEl.style.display = "none";
  detailView.style.display = "block";

  detailContent.innerHTML = `
    <h2>${title}</h2>
    <div>${content}</div>
  `;

  history.pushState({slug}, "", "?post=" + slug);
}

// back
function goBack(){
  postsEl.style.display = "grid";
  detailView.style.display = "none";
  history.pushState({}, "", window.location.pathname);
}

// check URL
function checkURL(){
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("post");

  if(slug && allPosts.length){
    openPost(slug);
  }
}

// load posts
async function loadPosts(page){

  postsEl.innerHTML = `<div class="loading">Loading...</div>`;

  try{
    const res = await fetch(API + "?page=" + page);
    const data = await res.json();

    allPosts = data.posts || [];

    postsEl.innerHTML = allPosts.map(p => createCard(p)).join("");

    pageNumEl.innerText = page;
    prevBtn.disabled = page <= 1;

    checkURL();

  }catch(e){
    postsEl.innerHTML = `<div class="loading">Failed to load posts</div>`;
  }
}

// pagination
nextBtn.onclick = () => {
  currentPage++;
  loadPosts(currentPage);
};

prevBtn.onclick = () => {
  if(currentPage > 1){
    currentPage--;
    loadPosts(currentPage);
  }
};

// browser back button support
window.onpopstate = () => {
  if(location.search.includes("post=")){
    const slug = new URLSearchParams(location.search).get("post");
    openPost(slug);
  } else {
    goBack();
  }
};

loadPosts(currentPage);
</script>


<script>

// CACHE DOMAINS
const domainMap = {};

document.querySelectorAll(&#39;meta[name=&quot;video-domain&quot;]&#39;).forEach(meta =&gt; {
  const id = meta.getAttribute(&quot;data-id&quot;);
  domainMap[id] = meta.content;
});


// SET POSTER
function setPoster() {
  const meta = document.querySelector(&#39;meta[property=&quot;og:image&quot;]&#39;);

  const fallback = &quot;https://images.unsplash.com/photo-1507525428034-b723cf961d3e&quot;;
  const poster = meta &amp;&amp; meta.content ? meta.content : fallback;

  document.querySelectorAll(&quot;.video-poster&quot;).forEach(el =&gt; {
    el.style.backgroundImage = &quot;url(&#39;&quot; + poster + &quot;&#39;)&quot;;
  });
}


// PLAY VIDEO
function playVideo(el) {
  const wrapper = el.parentElement;
  const iframe = wrapper.querySelector(&quot;.video-player&quot;);
  const poster = wrapper.querySelector(&quot;.video-poster&quot;);

  // hide overlay + poster
  el.style.display = &quot;none&quot;;
  poster.style.display = &quot;none&quot;;

  // get domain
  const domainId = wrapper.getAttribute(&quot;data-domain-id&quot;);
  const domain = domainMap[domainId] || &quot;&quot;;

  // load iframe
  if (!iframe.src) {
    const path = iframe.getAttribute(&quot;data-src&quot;);
    iframe.src = domain + path;
  }
}


// INIT
window.addEventListener(&quot;load&quot;, setPoster);

</script>
  
  
  
  
 <!-- POPUP VIEWER -->

  <span class='tmdb-close'>*</span>

  <button class='tmdb-nav tmdb-prev'>**</button>

  <img id='tmdbPopupImg' src=''/>

  <script>
const popup = document.getElementById(&quot;tmdbPopup&quot;);
const popupImg = document.getElementById(&quot;tmdbPopupImg&quot;);

const images = document.querySelectorAll(&quot;.tmdb-extra-images img&quot;);

let currentIndex = 0;

/* OPEN IMAGE */
function openImage(index){
  currentIndex = index;
  popupImg.src = images[currentIndex].src;
  popup.classList.add(&quot;active&quot;);

  // ADD HISTORY STATE (prevents leaving page on back)
  history.pushState({ tmdbPopup: true }, &quot;&quot;);
}

/* NEXT IMAGE */
function nextImage(){
  currentIndex = (currentIndex + 1) % images.length;
  popupImg.src = images[currentIndex].src;
}

/* PREV IMAGE */
function prevImage(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  popupImg.src = images[currentIndex].src;
}

/* CLICK THUMBNAIL */
images.forEach((img, index) =&gt; {
  img.addEventListener(&quot;click&quot;, () =&gt; {
    openImage(index);
  });
});

/* BUTTONS */
document.querySelector(&quot;.tmdb-next&quot;).addEventListener(&quot;click&quot;, nextImage);
document.querySelector(&quot;.tmdb-prev&quot;).addEventListener(&quot;click&quot;, prevImage);

/* CLOSE */
function closePopup(){
  popup.classList.remove(&quot;active&quot;);
}

/* CLOSE BUTTON */
document.querySelector(&quot;.tmdb-close&quot;).addEventListener(&quot;click&quot;, () =&gt; {
  closePopup();
  history.back(); // sync history when closing manually
});

/* CLICK OUTSIDE */
popup.addEventListener(&quot;click&quot;, (e) =&gt; {
  if(e.target === popup){
    closePopup();
    history.back(); // sync history
  }
});

/* KEYBOARD SUPPORT */
document.addEventListener(&quot;keydown&quot;, (e) =&gt; {

  if(!popup.classList.contains(&quot;active&quot;)) return;

  if(e.key === &quot;ArrowRight&quot;){
    nextImage();
  }

  if(e.key === &quot;ArrowLeft&quot;){
    prevImage();
  }

  if(e.key === &quot;Escape&quot;){
    closePopup();
    history.back(); // sync back behavior
  }

});

/* =========================
   BACK BUTTON FIX (IMPORTANT)
   ========================= */
window.addEventListener(&quot;popstate&quot;, () =&gt; {
  if (popup.classList.contains(&quot;active&quot;)) {
    closePopup();
  }
});

/* =========================
   MOBILE SWIPE SUPPORT
   ========================= */

let touchStartX = 0;
let touchEndX = 0;

popupImg.addEventListener(&quot;touchstart&quot;, e =&gt; {
  touchStartX = e.changedTouches[0].screenX;
});

popupImg.addEventListener(&quot;touchend&quot;, e =&gt; {

  touchEndX = e.changedTouches[0].screenX;

  if(touchStartX - touchEndX &gt; 50){
    nextImage(); // swipe left
  }

  if(touchEndX - touchStartX &gt; 50){
    prevImage(); // swipe right
  }

});
</script>
