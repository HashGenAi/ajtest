<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Movie Blog</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  padding:20px;
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
}

h1{margin-bottom:25px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.card{
  background:#1c1c1c;
  border-radius:14px;
  overflow:hidden;
  transition:.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-4px);
}

.poster{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

.content{padding:14px;}

.title{
  font-size:17px;
  margin:0 0 10px;
  line-height:1.4;
}

.meta{
  font-size:13px;
  color:#bbb;
  margin-bottom:10px;
}

.labels{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:12px;
}

.label{
  background:#333;
  padding:4px 8px;
  border-radius:30px;
  font-size:12px;
}

.desc{
  font-size:14px;
  color:#ddd;
  line-height:1.5;
}

.pagination{
  margin-top:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

button{
  border:none;
  background:#fff;
  color:#000;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:.5;
}

.loading{
  text-align:center;
  padding:40px;
  font-size:18px;
}

#detailView{
  display:none;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

.backBtn{
  margin-bottom:15px;
}
</style>
</head>

<body>

<h1>Latest Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">
  <button class="backBtn" onclick="goBack()">⬅ Back</button>
  <div id="detailContent"></div>
</div>

<div class="pagination">
  <button id="prevBtn">Prev</button>
  <span id="pageNum">1</span>
  <button id="nextBtn">Next</button>
</div>

<script>
const API = "https://jiorockers-api.salim1monira.workers.dev";

let currentPage = 1;
let allPosts = [];

const postsEl = document.getElementById("posts");
const pageNumEl = document.getElementById("pageNum");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const detailView = document.getElementById("detailView");
const detailContent = document.getElementById("detailContent");

// slug generator
function slugify(text){
  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

function getImage(post){
  return (
    post.media$thumbnail?.url?.replace("/s72-c/","/s500/")
    ||
    post.content?.$t.match(/<img.*?src="(.*?)"/i)?.[1]
    ||
    "https://via.placeholder.com/500x280?text=No+Image"
  );
}

function getSummary(html){
  if(!html) return "";
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.innerText.replace(/\s+/g," ").trim().substring(0,120) + "...";
}

function getLabels(post){
  return post.category?.map(c => c.term) || [];
}

// create card
function createCard(post){
  const image = getImage(post);
  const title = post.title?.$t || "No Title";
  const summary = getSummary(post.content?.$t);
  const labels = getLabels(post);
  const date = new Date(post.published?.$t).toLocaleDateString();

  const slug = slugify(title);

  return `
    <div class="card" onclick="openPost('${slug}')">

      <img class="poster" src="${image}" loading="lazy">

      <div class="content">

        <h3 class="title">${title}</h3>

        <div class="meta">${date}</div>

        <div class="labels">
          ${labels.map(l => `<span class="label">${l}</span>`).join("")}
        </div>

        <div class="desc">${summary}</div>

      </div>

    </div>
  `;
}

// open post by slug
function openPost(slug){

  const post = allPosts.find(p =>
    slugify(p.title?.$t || "") === slug
  );

  if(!post){
    postsEl.style.display = "none";
    detailView.style.display = "block";
    detailContent.innerHTML = "<h2>Post not found</h2>";
    return;
  }

  const title = post.title?.$t || "No Title";
  const content = post.content?.$t || "";

  postsEl.style.display = "none";
  detailView.style.display = "block";

  detailContent.innerHTML = `
    <h2>${title}</h2>
    <div>${content}</div>
  `;

  history.pushState({slug}, "", "?post=" + slug);
}

// back
function goBack(){
  postsEl.style.display = "grid";
  detailView.style.display = "none";
  history.pushState({}, "", window.location.pathname);
}

// check URL
function checkURL(){
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("post");

  if(slug && allPosts.length){
    openPost(slug);
  }
}

// load posts
async function loadPosts(page){

  postsEl.innerHTML = `<div class="loading">Loading...</div>`;

  try{
    const res = await fetch(API + "?page=" + page);
    const data = await res.json();

    allPosts = data.posts || [];

    postsEl.innerHTML = allPosts.map(p => createCard(p)).join("");

    pageNumEl.innerText = page;
    prevBtn.disabled = page <= 1;

    checkURL();

  }catch(e){
    postsEl.innerHTML = `<div class="loading">Failed to load posts</div>`;
  }
}

// pagination
nextBtn.onclick = () => {
  currentPage++;
  loadPosts(currentPage);
};

prevBtn.onclick = () => {
  if(currentPage > 1){
    currentPage--;
    loadPosts(currentPage);
  }
};

// browser back button support
window.onpopstate = () => {
  if(location.search.includes("post=")){
    const slug = new URLSearchParams(location.search).get("post");
    openPost(slug);
  } else {
    goBack();
  }
};

loadPosts(currentPage);
</script>

</body>
</html>
