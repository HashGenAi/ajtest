<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Premium Movie Blog</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
      overflow-anchor:none;
    }

    body{
      background:
        radial-gradient(circle at top,#1c1c1c 0%,#0f0f0f 45%),
        #0f0f0f;
      color:#fff;
      font-family:Arial,sans-serif;
      padding:14px;
      overflow-x:hidden;
      overflow-anchor:none;
    }

    h1{
      text-align:center;
      font-size:34px;
      font-weight:800;
      margin-bottom:28px;
      letter-spacing:.5px;
      background:linear-gradient(90deg,#fff,#bbb);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .page-badge{
      position:sticky;
      top:12px;
      z-index:999;
      width:fit-content;
      margin-left:auto;
      margin-right:auto;
      margin-bottom:14px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      font-size:13px;
      font-weight:700;
      color:#fff;
      display:none;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(6,minmax(0,1fr));
      gap:18px;
      align-items:start;
    }

    @media(max-width:1300px){
      .grid{
        grid-template-columns:repeat(5,1fr);
      }
    }

    @media(max-width:1050px){
      .grid{
        grid-template-columns:repeat(4,1fr);
      }
    }

    @media(max-width:768px){
      .grid{
        grid-template-columns:repeat(3,1fr);
        gap:10px;
      }
    }

    @media(max-width:480px){
      .grid{
        grid-template-columns:repeat(3,1fr);
        gap:8px;
      }
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:24px;
      background:linear-gradient(180deg,rgba(28,28,28,.96),rgba(16,16,16,.98));
      border:1px solid rgba(255,255,255,.05);
      transition:.35s ease;
      cursor:pointer;
      isolation:isolate;
      box-shadow:0 8px 25px rgba(0,0,0,.35);
      will-change:transform;
      text-decoration:none;
      color:inherit;
      display:block;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:26px;
      background:linear-gradient(135deg,rgba(255,0,102,.3),rgba(0,195,255,.25),rgba(0,255,170,.15),rgba(255,174,0,.25));
      background-size:300% 300%;
      animation:borderMove 7s linear infinite;
      opacity:0;
      z-index:-2;
      transition:.35s ease;
    }

    .card:hover::before{
      opacity:1;
    }

    @keyframes borderMove{
      0%{ background-position:0% 50%; }
      100%{ background-position:300% 50%; }
    }

    .card:hover{
      transform:scale(1.02);
      box-shadow:0 20px 45px rgba(0,0,0,.55),0 0 20px rgba(255,0,102,.15);
    }

    .poster-wrap{
      position:relative;
      width:100%;
      aspect-ratio:2/3;
      overflow:hidden;
      background:#1b1b1b;
    }

    .poster{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:transform .8s ease, filter .4s ease;
    }

    .card:hover .poster{
      transform:scale(1.1);
      filter:brightness(1.08);
    }

    .poster-wrap::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:35%;
      background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
      pointer-events:none;
    }

    .content{
      position:relative;
      padding:12px;
      z-index:2;
    }

    .title{
      font-size:14px;
      font-weight:800;
      line-height:1.45;
      overflow:visible;
      white-space:normal;
      word-break:break-word;
      transition:.3s ease;
      text-shadow:0 2px 10px rgba(0,0,0,.35);
      margin-bottom:10px;
    }

    .card:nth-child(6n+1) .title{ color:#ffbe76; }
    .card:nth-child(6n+2) .title{ color:#d6a2ff; }
    .card:nth-child(6n+3) .title{ color:#79dfff; }
    .card:nth-child(6n+4) .title{ color:#72f1b8; }
    .card:nth-child(6n+5) .title{ color:#ffe06b; }
    .card:nth-child(6n+6) .title{ color:#ff9e9e; }

    .card:hover .title{
      transform:translateX(5px);
    }

    .labels{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      gap:6px;
      width:100%;
    }

    .label{
      display:inline-block;
      flex:0 0 auto;
      width:auto;
      max-width:100%;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(8px);
      color:#f1f1f1;
      font-size:10px;
      font-weight:600;
      padding:5px 9px;
      border-radius:40px;
      transition:.3s ease;
      white-space:nowrap;
    }

    .label:hover{
      background:rgba(255,255,255,.16);
    }

    .pagination{
      margin-top:40px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .nav-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border:none;
      outline:none;
      background:linear-gradient(135deg,#ff004c,#ff5e00);
      color:#fff;
      padding:12px 20px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.3s ease;
      box-shadow:0 10px 20px rgba(255,0,76,.2);
      min-width:88px;
    }

    .nav-btn:hover{
      transform:translateY(-3px) scale(1.03);
      box-shadow:0 14px 30px rgba(255,0,76,.35);
    }

    .nav-btn.disabled{
      opacity:.45;
      pointer-events:none;
      cursor:not-allowed;
      box-shadow:none;
      transform:none;
    }

    #pageNum{
      font-size:16px;
      font-weight:700;
      color:#ddd;
    }

    #detailView{
      display:none;
      max-width:1000px;
      margin:auto;
      background:linear-gradient(180deg,#1c1c1c,#131313);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      padding:22px;
      box-shadow:0 15px 40px rgba(0,0,0,.45);
      overflow-anchor:none;
    }

    .detail-title{
      margin-bottom:20px;
      font-size:32px;
      line-height:1.5;
    }

    #relatedPostsSection{
      margin-top:40px;
      min-height:520px;
      overflow-anchor:none;
    }

    #relatedPostsSection h2{
      margin-bottom:20px;
      font-size:28px;
      font-weight:800;
      color:#fff;
    }

    #relatedPosts{
      align-items:start;
    }

    #relatedPosts .card:hover{
      transform:none;
      box-shadow:0 8px 25px rgba(0,0,0,.35);
    }

    #relatedPosts .card:hover .poster{
      transform:none;
      filter:brightness(1.02);
    }

    #relatedPosts .card:hover .title{
      transform:none;
    }

    .loading{
      grid-column:1/-1;
      text-align:center;
      padding:80px 20px;
      font-size:18px;
      color:#ddd;
    }

    ::-webkit-scrollbar{
      width:8px;
    }

    ::-webkit-scrollbar-track{
      background:#111;
    }

    ::-webkit-scrollbar-thumb{
      background:#333;
      border-radius:30px;
    }
  </style>
</head>

<body>

  <div id="pageBadge" class="page-badge"></div>

  <h1>Latest Movies</h1>

  <div id="posts" class="grid"></div>

  <div class="pagination" id="pagination">
    <a id="prevBtn" class="nav-btn" href="?page=1">Prev</a>
    <span id="pageNum">1</span>
    <a id="nextBtn" class="nav-btn" href="?page=2">Next</a>
  </div>

  <div id="detailView">
    <a id="backBtn" class="nav-btn" style="margin-bottom:20px; display:inline-flex;" href="?page=1">⬅ Back</a>
    <div id="detailContent"></div>

    <div id="relatedPostsSection" style="display:none;">
      <h2>Related Posts</h2>
      <div id="relatedPosts" class="grid"></div>
    </div>
  </div>

  <script>
    const API = "https://jiorockers-api.salim1monira.workers.dev";
    const POSTS_PER_PAGE = 24;
    const MAX_SEARCH_PAGES = 80;

    let currentPage = 1;
    let allPosts = [];
    let relatedPostsData = [];
    let postPageCache = new Map();

    const postsEl = document.getElementById("posts");
    const detailView = document.getElementById("detailView");
    const detailContent = document.getElementById("detailContent");
    const pagination = document.getElementById("pagination");
    const pageNumEl = document.getElementById("pageNum");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");
    const relatedPostsSection = document.getElementById("relatedPostsSection");
    const relatedPostsEl = document.getElementById("relatedPosts");
    const pageBadge = document.getElementById("pageBadge");

    function slugify(text){
      return text.toString().toLowerCase().trim()
        .replace(/[^a-z0-9]+/g,'-')
        .replace(/(^-|-$)/g,'');
    }

    function getImage(post){
      return (
        post.media$thumbnail?.url?.replace("/s72-c/","/s1200/")
        ||
        post.content?.$t?.match(/<img.*?src="(.*?)"/i)?.[1]
        ||
        "https://via.placeholder.com/500x750?text=No+Image"
      );
    }

    function getLabels(post){
      return (post.category || [])
        .map(c => c.term)
        .filter(label => {
          if(!label) return false;
          const l = label.toLowerCase().trim();
          return l !== "movies" && l !== "trending";
        });
    }

    function createCard(post){
      const image = getImage(post);
      const title = post.title?.$t || "No Title";
      const labels = getLabels(post);
      const slug = slugify(title);
      const href = `?post=${encodeURIComponent(slug)}`;

      return `
        <a class="card" href="${href}" data-slug="${slug}">
          <div class="poster-wrap">
            <img class="poster" src="${image}" loading="lazy" alt="${title}">
          </div>

          <div class="content">
            <div class="title">${title}</div>

            <div class="labels">
              ${labels.slice(0,6).map(label => `<span class="label">${label}</span>`).join("")}
            </div>
          </div>
        </a>
      `;
    }

    function isViewingPost(){
      return detailView.style.display === "block";
    }

    function updatePageBadge(){
      if(currentPage > 1 && !isViewingPost()){
        pageBadge.style.display = "inline-flex";
        pageBadge.textContent = `Page ${currentPage}`;
      }else{
        pageBadge.style.display = "none";
        pageBadge.textContent = "";
      }
    }

    function showHome(){
      postsEl.style.display = "grid";
      pagination.style.display = "flex";
      detailView.style.display = "none";
      updatePageBadge();
    }

    function showDetail(){
      postsEl.style.display = "none";
      pagination.style.display = "none";
      detailView.style.display = "block";
      updatePageBadge();
    }

    async function fetchPage(page){
      if(postPageCache.has(page)){
        return postPageCache.get(page);
      }

      const res = await fetch(`${API}?page=${page}&limit=${POSTS_PER_PAGE}`);
      const data = await res.json();
      const posts = data.posts || [];
      postPageCache.set(page, posts);
      return posts;
    }

    async function findPostBySlug(slug){
      const searched = new Set();

      const currentPagePosts = allPosts || [];
      let found = currentPagePosts.find(p => slugify(p.title?.$t || "") === slug);
      if(found){
        return { post: found, page: currentPage };
      }

      found = relatedPostsData.find(p => slugify(p.title?.$t || "") === slug);
      if(found){
        return { post: found, page: currentPage };
      }

      const firstPagePosts = await fetchPage(1);
      found = firstPagePosts.find(p => slugify(p.title?.$t || "") === slug);
      if(found){
        return { post: found, page: 1 };
      }
      searched.add(1);

      for(let page = 2; page <= MAX_SEARCH_PAGES; page++){
        if(searched.has(page)) continue;

        const posts = await fetchPage(page);
        if(!posts.length) break;

        found = posts.find(p => slugify(p.title?.$t || "") === slug);
        if(found){
          return { post: found, page };
        }

        if(posts.length < POSTS_PER_PAGE) break;
      }

      return null;
    }

    async function loadRelatedPosts(currentSlug){
      try{
        const keepY = window.scrollY;

        relatedPostsSection.style.display = "block";
        relatedPostsEl.innerHTML = `<div class="loading">Loading related posts...</div>`;

        const res = await fetch(`${API}?page=1&limit=24`);
        const data = await res.json();

        relatedPostsData = data.posts || [];

        const relatedPosts = relatedPostsData
          .filter(post => slugify(post.title?.$t || "") !== currentSlug)
          .slice(0,24);

        if(!relatedPosts.length){
          relatedPostsSection.style.display = "none";
          relatedPostsEl.innerHTML = "";
          return;
        }

        relatedPostsEl.innerHTML = relatedPosts.map(post => createCard(post)).join("");

        requestAnimationFrame(() => {
          window.scrollTo(0, keepY);
        });
      }catch(e){
        relatedPostsSection.style.display = "block";
        relatedPostsEl.innerHTML = `<div class="loading">Failed to load related posts</div>`;
      }
    }

    async function openPost(slug, addHistory = true){
      showDetail();
      detailContent.innerHTML = `<div class="loading">Loading post...</div>`;
      relatedPostsSection.style.display = "none";
      relatedPostsEl.innerHTML = "";

      const result = await findPostBySlug(slug);

      if(!result){
        detailContent.innerHTML = "<h2>Post not found</h2>";
        backBtn.href = `?page=${currentPage}`;
        updatePageBadge();
        return;
      }

      const post = result.post;
      const foundPage = result.page || 1;

      currentPage = foundPage;
      pageNumEl.innerText = currentPage;
      prevBtn.href = `?page=${currentPage > 1 ? currentPage - 1 : 1}`;
      nextBtn.href = `?page=${currentPage + 1}`;
      backBtn.href = `?page=${foundPage}`;

      const title = post.title?.$t || "No Title";
      const content = post.content?.$t || "";

      detailContent.innerHTML = `
        <h2 class="detail-title">${title}</h2>
        <div>${content}</div>
      `;

      if(addHistory){
        history.pushState(
          { page: foundPage, post: slug },
          "",
          `?post=${encodeURIComponent(slug)}`
        );
      }

      await loadRelatedPosts(slug);
      updatePageBadge();
    }

    function loadPageFromAPI(page, cb){
      postsEl.innerHTML = `<div class="loading">Loading Premium Movies...</div>`;

      fetch(`${API}?page=${page}&limit=${POSTS_PER_PAGE}`)
        .then(res => res.json())
        .then(data => {
          allPosts = data.posts || [];
          postPageCache.set(page, allPosts);

          postsEl.innerHTML = allPosts.slice(0, POSTS_PER_PAGE).map(post => createCard(post)).join("");
          pageNumEl.innerText = page;

          const prevPage = page > 1 ? page - 1 : 1;
          const nextPage = page + 1;

          prevBtn.href = `?page=${prevPage}`;
          nextBtn.href = `?page=${nextPage}`;

          if(page <= 1){
            prevBtn.classList.add("disabled");
            prevBtn.setAttribute("aria-disabled", "true");
          }else{
            prevBtn.classList.remove("disabled");
            prevBtn.removeAttribute("aria-disabled");
          }

          nextBtn.classList.remove("disabled");
          nextBtn.removeAttribute("aria-disabled");

          updatePageBadge();

          if(typeof cb === "function") cb();
        })
        .catch(() => {
          postsEl.innerHTML = `<div class="loading">Failed to load posts</div>`;
        });
    }

    function renderPage(page, addHistory = true){
      currentPage = page;
      updatePageBadge();

      loadPageFromAPI(page, () => {
        showHome();
        relatedPostsSection.style.display = "none";
        relatedPostsEl.innerHTML = "";

        backBtn.href = `?page=${page}`;

        if(addHistory){
          history.pushState({ page }, "", `?page=${page}`);
        }

        const params = new URLSearchParams(window.location.search);
        const slug = params.get("post");
        if(slug){
          openPost(slug, false);
        }
      });
    }

    function initFromURL(){
      const params = new URLSearchParams(window.location.search);
      const page = parseInt(params.get("page") || "1", 10);
      const slug = params.get("post");

      currentPage = Number.isFinite(page) && page > 0 ? page : 1;
      pageNumEl.innerText = currentPage;
      updatePageBadge();

      loadPageFromAPI(currentPage, async () => {
        if(slug){
          await openPost(slug, false);
        }else{
          showHome();
        }
      });
    }

    prevBtn.addEventListener("click", (e) => {
      if(prevBtn.classList.contains("disabled")){
        e.preventDefault();
        return;
      }
      e.preventDefault();
      if(currentPage > 1){
        renderPage(currentPage - 1, true);
      }
    });

    nextBtn.addEventListener("click", (e) => {
      e.preventDefault();
      renderPage(currentPage + 1, true);
    });

    backBtn.addEventListener("click", (e) => {
      e.preventDefault();
      history.back();
    });

    window.onpopstate = () => {
      const params = new URLSearchParams(window.location.search);
      const page = parseInt(params.get("page") || "1", 10);
      const slug = params.get("post");

      currentPage = Number.isFinite(page) && page > 0 ? page : 1;
      pageNumEl.innerText = currentPage;

      loadPageFromAPI(currentPage, async () => {
        if(slug){
          await openPost(slug, false);
        }else{
          showHome();
          relatedPostsSection.style.display = "none";
          relatedPostsEl.innerHTML = "";
        }
      });
    };

    initFromURL();
  </script>

</body>
</html>
