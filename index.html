<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movie Blog</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#111;
  color:#fff;
  font-family:Arial;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.card{
  background:#1c1c1c;
  border-radius:12px;
  cursor:pointer;
  overflow:hidden;
}

.poster{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{
  padding:12px;
}

#detailView{
  display:none;
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<h1>Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">
  <button onclick="goBack()">⬅ Back</button>
  <div id="detailContent"></div>
</div>

<script>

const API = "https://jiorockers-api.salim1monira.workers.dev";

let postsData = [];

const postsEl = document.getElementById("posts");
const detailView = document.getElementById("detailView");
const detailContent = document.getElementById("detailContent");

// slug
function slugify(t){
  return (t||"")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

// image
function getImage(p){
  return p.media$thumbnail?.url?.replace("/s72-c/","/s500/")
    || "https://via.placeholder.com/500x280";
}

// card
function createCard(p){
  const title = p.title?.$t || "No Title";
  const slug = slugify(title);
  const img = getImage(p);

  return `
    <div class="card" onclick="openPost('${slug}')">
      <img class="poster" src="${img}">
      <div class="content">
        <h3>${title}</h3>
      </div>
    </div>
  `;
}

// OPEN POST
function openPost(slug){
  location.href = "/post/" + slug;
}

// RENDER POST
function showPost(post){
  postsEl.style.display = "none";
  detailView.style.display = "block";

  detailContent.innerHTML = `
    <h2>${post.title?.$t}</h2>
    <div>${post.content?.$t || ""}</div>
  `;
}

// BACK
function goBack(){
  history.pushState({}, "", "/");
  postsEl.style.display = "grid";
  detailView.style.display = "none";
}

// FIND POST
function findPost(slug){
  return postsData.find(p =>
    slugify(p.title?.$t) === slug
  );
}

// ROUTER
function router(){
  const path = window.location.pathname;

  if(path.startsWith("/post/")){
    const slug = path.replace("/post/","");

    const post = findPost(slug);

    if(post){
      showPost(post);
    }else{
      detailView.style.display = "block";
      detailContent.innerHTML = "<h2>Post not found</h2>";
    }
  }
}

// LOAD DATA
async function load(){
  const res = await fetch(API + "?page=1");
  const data = await res.json();

  postsData = data.posts || [];

  postsEl.innerHTML = postsData.map(createCard).join("");

  router();
}

load();

</script>

</body>
</html>
